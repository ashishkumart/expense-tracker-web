services:
  # 1. MongoDB - Access it from your local GUI tools
  mongodb:
    image: mongo:7.0
    container_name: dev_mongodb
    ports:
      - "27017:27017" # Allows you to connect using MongoDB Compass from your PC
    volumes:
      - mongo_data:/data/db
  # 2. Node.js Backend - Live reload enabled
  backend:
    build: ./backend
    container_name: dev_backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/expense_tracker
      - PORT=5000
    volumes:
      - ./backend:/usr/src/app       # Binds your local backend code to the container
      - /usr/src/app/node_modules    # Protects container's node_modules from being overwritten
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: dev_frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app             # Binds your local Flutter code to the container
    depends_on:
      - backend
volumes:
  mongo_data:

  