apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: frontend   
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ashishkumart/expense-frontend:v1 # Your built image
        ports:
          - containerPort: 80 # Nginx listens on port 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: LoadBalancer
  selector: 
    app: frontend
  ports:
    - protocol: TCP
      port: 8080       # Keeps localhost:8080 on your Mac browser
      targetPort: 80   # Forwards traffic to Nginx on port 80